name: GDScript

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download GDScript formatter
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/GDQuest/GDScript-formatter/releases/latest \
            | grep -oP '"browser_download_url":\s*"\K[^"]*linux-x86_64\.zip')
          curl -sL "$DOWNLOAD_URL" -o formatter.zip
          unzip formatter.zip
          mv gdscript-formatter-*-linux-x86_64 gdscript-formatter
          chmod +x gdscript-formatter

      - name: Format
        run: find . -name "*.gd" -not -path "./.godot/*" -exec ./gdscript-formatter {} +

      - name: Commit formatting fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "style: auto-format GDScript files"
          git push
